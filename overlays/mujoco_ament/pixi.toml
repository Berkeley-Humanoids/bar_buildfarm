# OVERLAY (copied into src/mujoco_ament/ by apply-overlays.sh).
# NOTE: mujoco_ament FetchContents the MuJoCo release tarball from GitHub at
# CMake configure time → this build REQUIRES network access. rattler-build
# permits network during build (unlike Debian sbuild), so CI works; the build is
# non-hermetic. If it proves flaky, repackage the MuJoCo binary as its own conda
# package and have this depend on it instead.
[package.build.backend]
name = "pixi-build-ros"
# Pinned: the backend must stay build-API compatible with the pixi version
# pinned in bar_buildfarm CI ("*" pulled a 2026-06-10 nightly that broke the
# handshake). Bump deliberately, together with that pixi pin.
version = "==0.5.0"
channels = ["https://prefix.dev/conda-forge"]

[package.build.config]
distro = "jazzy"
